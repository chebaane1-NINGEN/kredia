<div class="login-wrapper">

  <!-- Back to landing — top left -->
  <a routerLink="/" class="btn-back-landing">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Return to Landing Page
  </a>

  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon">
        <img src="/assets/kredia-logo.png" alt="Kredia" />
      </div>
      <h1 class="brand-name">KREDIA</h1>
    </div>

    <p class="login-subtitle">Sign in to your account</p>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

      <div class="alert error" *ngIf="error">⚠️ {{ error }}</div>

      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@kredia.com"
          autocomplete="email"
        />
        <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Valid email required.
        </small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <small *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Password required (min. 4 characters).
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading" class="spinner-wrap">
          <span class="spinner"></span> Signing in...
        </span>
      </button>

    </form>

  </div>
</div>
