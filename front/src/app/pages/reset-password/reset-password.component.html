<div class="auth-page reset-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="brand-logo">●</span>
        <h1>Create New Password</h1>
        <p>Enter your new password below to complete the reset</p>
      </div>

      <div class="alert alert-error" *ngIf="error">
        <span>✕</span> {{ error }}
      </div>
      <div class="alert alert-success" *ngIf="success">
        <span>✓</span> {{ success }}
      </div>

      <form *ngIf="!success || !!token" [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="form-field">
          <label for="password">New Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="form-input"
          />
          <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            Password is required (minimum 6 characters)
          </span>
        </div>

        <div class="form-field">
          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="form-input"
          />
          <span class="field-error" *ngIf="form.errors?.['passwordMismatch'] && form.touched">
            Passwords must match
          </span>
        </div>

        <button type="submit" class="btn-primary btn-full" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Reset Password</span>
          <span *ngIf="loading" class="btn-loading">
            <span class="spinner"></span> Resetting...
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Know your password? <a routerLink="/login" class="link-primary">Sign in</a></p>
      </div>
    </div>

    <div class="auth-visual">
      <div class="visual-gradient"></div>
      <div class="visual-content">
        <h2>Secure Password Reset</h2>
        <p>Your password is protected with military-grade encryption</p>
      </div>
    </div>
  </div>
</div>
