<div class="auth-page forgot-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="brand-logo">●</span>
        <h1>Reset Password</h1>
        <p>Enter your email to receive a secure reset link</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="alert alert-error" *ngIf="error">
          <span>✕</span> {{ error }}
        </div>
        <div class="alert alert-success" *ngIf="success">
          <span>✓</span> {{ success }}
        </div>

        <div class="form-field">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="name@example.com"
            class="form-input"
          />
          <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
            Please enter a valid email
          </span>
        </div>

        <button type="submit" class="btn-primary btn-full" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading" class="btn-loading">
            <span class="spinner"></span> Sending...
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a routerLink="/login" class="link-primary">Sign in</a></p>
      </div>
    </div>

    <div class="auth-visual">
      <div class="visual-gradient"></div>
      <div class="visual-content">
        <h2>Secure Password Reset</h2>
        <p>Reset your password safely with our encrypted reset process</p>
      </div>
    </div>
  </div>
</div>
