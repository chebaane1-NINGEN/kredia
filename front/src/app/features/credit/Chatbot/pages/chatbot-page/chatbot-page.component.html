<section class="chatbot-page">
  <header>
    <h1>AI Coach — Repayment Recommendation</h1>
    <p>Describe your financial situation and the chatbot will recommend the best repayment type for you.</p>
  </header>

  <!-- Browser compatibility warning -->
  <div class="alert warning" *ngIf="!speechSupported">
    ⚠️ Voice recognition is not supported by your browser. Please use Chrome or Edge.
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="chatbot-form">
    <label>
      <span>Description</span>

      <!-- Textarea + microphone -->
      <div class="textarea-wrapper" [class.recording]="isRecording">
        <textarea rows="6" formControlName="description"
          placeholder="e.g. I have a stable income and prefer fixed monthly payments..."
          [class.has-mic]="speechSupported"></textarea>

        <!-- Interim dictation text -->
        <div class="interim-overlay" *ngIf="interimText">
          <span class="interim-text">🎤 {{ interimText }}</span>
        </div>

        <!-- Microphone button -->
        <button
          *ngIf="speechSupported"
          type="button"
          class="mic-btn"
          [class.active]="isRecording"
          (click)="toggleVoice()"
          [title]="isRecording ? 'Stop recording' : 'Speak to the chatbot'"
          [attr.aria-label]="isRecording ? 'Stop recording' : 'Start voice recording'"
        >
          <span class="mic-icon" *ngIf="!isRecording">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </span>
          <span class="mic-icon stop" *ngIf="isRecording">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </span>
        </button>
      </div>

      <!-- Recording badge -->
      <div class="recording-badge" *ngIf="isRecording">
        <span class="pulse-dot"></span>
        Recording... Speak now
      </div>

      <small *ngIf="form.controls.description.touched && form.controls.description.invalid">
        Please enter a description of at least 10 characters.
      </small>
    </label>

    <!-- Microphone error -->
    <div class="alert error" *ngIf="voiceError">
      🎤 {{ voiceError }}
    </div>

    <div class="actions">
      <button type="submit" class="btn primary" [disabled]="loading">
        {{ loading ? 'Sending...' : 'Get Recommendation' }}
      </button>
      <button type="reset" class="btn outline">Reset</button>
    </div>
  </form>

  <div class="alert error" *ngIf="error">{{ error }}</div>

  <div class="result" *ngIf="response">
    <h3>Recommendation</h3>
    <p>{{ response.recommendation }}</p>
  </div>
</section>
