<header class="topbar">

  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Global search (Users, Transactions, Logs...)" />
  </div>

  <!-- Right actions -->
  <div class="topbar-actions">
    <span class="status-badge">
      <span class="status-dot"></span>
      System Live
    </span>
    <button class="icon-btn" (click)="toggleDarkMode()" title="Toggle dark mode">
      <span *ngIf="!darkModeService.isDarkMode()">🌙</span>
      <span *ngIf="darkModeService.isDarkMode()">☀️</span>
    </button>
    <button class="icon-btn" title="Notifications">🔔</button>
  </div>

</header>
