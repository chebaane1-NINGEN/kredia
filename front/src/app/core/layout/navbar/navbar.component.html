<header class="topbar">

  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Global search (Users, Transactions, Logs...)" />
  </div>

  <!-- Right actions -->
  <div class="topbar-actions">
    <span class="status-badge">
      <span class="status-dot"></span>
      System Live
    </span>
    <button class="icon-btn" (click)="toggleDarkMode()" title="Toggle dark mode">
      <span *ngIf="!darkModeService.isDarkMode()">🌙</span>
      <span *ngIf="darkModeService.isDarkMode()">☀️</span>
    </button>
    <div class="notification-wrapper">
      <button class="icon-btn" title="Notifications" (click)="toggleNotifications()">
        🔔
        <span class="notification-badge" *ngIf="hasUnread">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
      </button>

      <div class="notification-dropdown" *ngIf="showDropdown">
        <div class="dropdown-header">
          Notifications
          <span class="unread-label" *ngIf="unreadCount > 0">{{ unreadCount }} non lue{{ unreadCount > 1 ? 's' : '' }}</span>
        </div>
        <div class="dropdown-list" *ngIf="recentUpdates.length > 0; else noNotifs">
          <div class="dropdown-item" [class.unread]="isUnread(item)" *ngFor="let item of recentUpdates" (click)="goToTarget(item)">
            <div class="item-icon">{{ item.type === 'CREDIT' ? '💳' : (item.type === 'KYC' ? '📄' : '💰') }}</div>
            <div class="item-content">
              <span class="item-title">{{ item.title }}</span>
              <span class="item-date">{{ item.date | date:'short' }}</span>
            </div>
            <div class="item-right">
              <span class="unread-dot" *ngIf="isUnread(item)"></span>
              <div class="item-status" [ngClass]="item.status.toLowerCase()">
                {{ item.status }}
              </div>
            </div>
          </div>
        </div>
        <ng-template #noNotifs>
          <div class="dropdown-empty">No new notifications</div>
        </ng-template>
      </div>
    </div>
  </div>

</header>
