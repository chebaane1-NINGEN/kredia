<ng-container *ngIf="!isLoginPage; else bareOutlet">
  <div class="app-layout">

    <!-- Sidebar: hidden on home and public (unauthenticated) simulator -->
    <app-sidebar *ngIf="!isHomePage && !isPublicSimulateurPage"></app-sidebar>

    <!-- Main area -->
    <div class="main-area" [class.no-sidebar]="isHomePage || isPublicSimulateurPage">
      <app-navbar></app-navbar>
      <main class="page-content">
        <router-outlet></router-outlet>
      </main>
      <!-- Footer: only on landing page and public simulator -->
      <app-footer *ngIf="isHomePage || isPublicSimulateurPage"></app-footer>
    </div>

  </div>
</ng-container>

<!-- Page login : rendu sans shell (pas de sidebar, pas de navbar) -->
<ng-template #bareOutlet>
  <router-outlet></router-outlet>
</ng-template>
