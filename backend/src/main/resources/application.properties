# Configuration de l'application
spring.application.name=kredia

# Port du serveur
server.port=8086
ml.risk.service.url=http://localhost:8001/predict
ml.risk.service.timeout-ms=2000

# Default Prediction Microservice
ml.default-prediction.url=http://localhost:8002

# Configuration de la base de donnees MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/kredia_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration Flyway avec timestamps (format: YYYYMMDDHHmmss__description.sql)
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true


# Configuration des logs
logging.level.root=INFO
logging.level.com.kredia=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuration Hedera
hedera.accountId=0.0.7899964
hedera.privateKey=3030020100300706052b8104000a042204203994d70e9a219da57beb417414219f23eb82feefe052d83e5c70ff6b6c5989ec
hedera.topicId=00.0.8443304
hedera.network=testnet


# Spring AI Vertex AI Gemini Configuration
spring.ai.vertex.ai.gemini.project-id=ardent-gearbox-451413-e4
spring.ai.vertex.ai.gemini.location=us-central1

# Configuration Gemini AI
gemini.model=gemini-2.5-flash

# Frontend URL for redirects and links
app.frontend.url=http://localhost:4200
app.backend.url=http://localhost:8086


spring.config.import=optional:classpath:secrets.properties

# Configuration Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Alpha Vantage API key
market.alphavantage.api-key=ACH9TF7OZXXUFNH0

gemini.api-key=${GEMINI_API_KEY:placeholder}
brevo.api.key=${BREVO_API_KEY:placeholder}
kredia.mail.from=${KREDIA_MAIL_FROM:no-reply@kredia.local}
kredia.mail.from.name=${KREDIA_MAIL_FROM_NAME:KREDIA}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# Configuration Jackson pour éviter les erreurs de sérialisation Hibernate
spring.jackson.serialization.fail-on-empty-beans=false

# OAuth2 Registration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email
