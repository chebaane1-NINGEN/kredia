# Configuration de l'application
spring.application.name=kredia

# Port du serveur
server.port=8086
ml.risk.service.url=http://localhost:8001/predict
ml.risk.service.timeout-ms=2000

# Configuration de la base de donnees MySQL via MAMP
spring.datasource.url=jdbc:mysql://localhost:8889/kredia_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

google.client.id=117709904608-bt9h5uk975qn4tgr4pi9r5askcdut0rn.apps.googleusercontent.com
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration Flyway avec timestamps (format: YYYYMMDDHHmmss__description.sql)
spring.flyway.enabled=false

# Configuration des logs
logging.level.root=INFO
logging.level.com.kredia=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuration Hedera (secrets: hedera.accountId, hedera.privateKey, hedera.topicId)
hedera.network=testnet
hedera.accountId=${HEDERA_ACCOUNT_ID:}
hedera.privateKey=${HEDERA_PRIVATE_KEY:}
hedera.topicId=${HEDERA_TOPIC_ID:}

# Configuration Brevo (secrets: brevo.api.key)
brevo.api.key=${BREVO_API_KEY:}
kredia.mail.from=${KREDIA_MAIL_FROM:no-reply@kredia.com}
kredia.mail.from.name=${KREDIA_MAIL_FROM_NAME:Kredia}

# Configuration Gemini AI
gemini.model=gemini-2.5-flash
gemini.api-key=${GEMINI_API_KEY:}

# Import des cles sensibles depuis secrets.properties
spring.config.import=optional:classpath:secrets.properties

# Configuration Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OAuth2 Configuration (Google & GitHub)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# JWT configuration
jwt.secret=${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LXNob3VsZC1iZS1yZXBsYWNlZA==}

# Alpha Vantage API key
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:}

# Configuration Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
market.alphavantage.api-key=ACH9TF7OZXXUFNH0

# Configuration Jackson pour eviter les erreurs de serialisation Hibernate
spring.jackson.serialization.fail-on-empty-beans=false

springdoc.override-with-generic-response=false
